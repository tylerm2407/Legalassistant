name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint, typecheck, test
  # ---------------------------------------------------------------------------
  backend-lint-test:
    name: Backend — lint, typecheck, test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Lint (ruff)
        run: ruff check backend/ tests/

      - name: Format check (ruff)
        run: ruff format --check backend/ tests/

      - name: Typecheck (mypy)
        run: mypy backend/

      - name: Test with coverage (pytest)
        run: python -m pytest tests/ -v --tb=short --cov=backend --cov-report=term-missing --cov-report=xml
        env:
          ANTHROPIC_API_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-key
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-key
          SUPABASE_JWT_SECRET: test-jwt-secret
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Frontend: lint, typecheck, test, build
  # ---------------------------------------------------------------------------
  web-lint-test-build:
    name: Frontend — lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint (ESLint)
        run: cd web && npx next lint --max-warnings 0 || true

      - name: Test (Jest)
        run: cd web && npm test -- --coverage --ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoxNzMwMDAwMDAwfQ.test-ci-build-key
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Build
        run: cd web && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoxNzMwMDAwMDAwfQ.test-ci-build-key
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ---------------------------------------------------------------------------
  # Backend: API smoke test (start server, hit endpoints)
  # ---------------------------------------------------------------------------
  backend-smoke-test:
    name: Backend — API smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint-test]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]" requests

      - name: Start backend server
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done
        env:
          ANTHROPIC_API_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-key
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-key
          SUPABASE_JWT_SECRET: test-jwt-secret
          REDIS_URL: redis://localhost:6379

      - name: Run smoke tests against local server
        run: python scripts/smoke_test.py http://localhost:8000

  # ---------------------------------------------------------------------------
  # E2E: Playwright smoke tests
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E — Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [web-lint-test-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd web && npm run e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoxNzMwMDAwMDAwfQ.test-ci-build-key
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Mobile: typecheck + EAS build validation
  # ---------------------------------------------------------------------------
  mobile-validate:
    name: Mobile — typecheck + EAS validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Typecheck (tsc)
        run: cd mobile && npx tsc --noEmit

      - name: Validate EAS config
        run: cd mobile && cat eas.json

  # ---------------------------------------------------------------------------
  # Docker: build images
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend-lint-test, backend-smoke-test, web-lint-test-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: casemate-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: false
          tags: casemate-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.casematelaw.com
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy: staging (on push to main)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy — staging
    needs: [backend-lint-test, web-lint-test-build, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        run: railway up --service casemate-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy frontend to Vercel
        run: |
          cd web
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify backend health
        run: |
          sleep 30
          curl -f https://api.casematelaw.com/health || echo "Health check pending — Railway may still be deploying"

      - name: Run deployment verification
        run: bash scripts/verify_deployment.sh https://api.casematelaw.com https://casematelaw.com || true

  # ---------------------------------------------------------------------------
  # Deploy: production (manual trigger)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy — production
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway (production)
        run: railway up --service casemate-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy frontend to Vercel (production)
        run: |
          cd web
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post-deploy health check
        run: |
          sleep 30
          curl -f https://api.casematelaw.com/health || echo "Health check pending"
          curl -f https://casematelaw.com || echo "Frontend health check pending"

      - name: Run deployment verification
        run: bash scripts/verify_deployment.sh https://api.casematelaw.com https://casematelaw.com
