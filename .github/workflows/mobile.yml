name: Mobile CI/CD

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"

jobs:
  # ---------------------------------------------------------------------------
  # Mobile: typecheck + validate
  # ---------------------------------------------------------------------------
  validate:
    name: Mobile — typecheck + validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Typecheck
        run: cd mobile && npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # EAS Build: preview (on PR)
  # ---------------------------------------------------------------------------
  eas-build-preview:
    name: EAS Build — preview
    needs: [validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Build preview (iOS + Android)
        run: cd mobile && eas build --platform all --profile preview --non-interactive

  # ---------------------------------------------------------------------------
  # EAS Build: production (on push to main)
  # ---------------------------------------------------------------------------
  eas-build-production:
    name: EAS Build — production
    needs: [validate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Build production (iOS + Android)
        run: cd mobile && eas build --platform all --profile production --non-interactive

  # ---------------------------------------------------------------------------
  # EAS Submit: App Store + Google Play (manual trigger)
  # ---------------------------------------------------------------------------
  eas-submit:
    name: EAS Submit — stores
    needs: [eas-build-production]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: app-store-submission

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Submit to App Store
        run: cd mobile && eas submit --platform ios --profile production --non-interactive

      - name: Submit to Google Play
        run: cd mobile && eas submit --platform android --profile production --non-interactive
