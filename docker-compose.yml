# docker-compose.yml — CaseMate multi-service orchestration
#
# Runs the full CaseMate stack locally:
#   - backend:  FastAPI Python API (port 8000)
#   - redis:    Redis 7 for rate limiting (port 6379)
#   - web:      Next.js frontend (port 3000)
#
# Usage:
#   docker compose up --build        # start all services
#   docker compose up backend redis  # backend only (frontend via npm run dev)
#   docker compose down              # stop and remove containers

version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

volumes:
  redis-data:
